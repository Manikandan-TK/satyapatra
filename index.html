<body>
<div class="wrap" id="app"></div>

<script>
// Fallback storage: if window.storage isn't provided by the hosting environment
// (this is the case once deployed outside Claude.ai — e.g. on Vercel), talk to
// our own /api/storage serverless function instead, which is backed by Upstash
// Redis. This keeps every other call site in this file (loadCase, saveCase,
// saveDoc, viewDocument, etc.) completely unchanged — they only ever know
// about window.storage.get/set, never about the transport underneath.
if(!window.storage){
  const STORAGE_API = '/api/storage';
  window.storage = {
    async get(key, shared){
      const res = await fetch(`${STORAGE_API}?key=${encodeURIComponent(key)}`);
      if(res.status === 404) throw new Error('not found');
      if(!res.ok) throw new Error('storage error: ' + res.status);
      const data = await res.json();
      return { key: data.key, value: data.value, shared };
    },
    async set(key, value, shared){
      const res = await fetch(STORAGE_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key, value })
      });
      if(!res.ok) return null;
      const data = await res.json();
      return { key: data.key, value: data.value, shared };
    },
    async delete(key, shared){
      const res = await fetch(`${STORAGE_API}?key=${encodeURIComponent(key)}`, { method: 'DELETE' });
      if(!res.ok) return null;
      return { key, deleted: true, shared };
    },
    async list(prefix, shared){
      const res = await fetch(`${STORAGE_API}?prefix=${encodeURIComponent(prefix || '')}`);
      if(!res.ok) return null;
      const data = await res.json();
      return { keys: data.keys, prefix, shared };
    }
  };
}

const FORM_SCHEMA = [
  { title:"Legal & Criminal History", fields:[
    {id:'crimCase', label:'Any ongoing or past criminal case where this person is or was the accused?', detail:'Briefly describe the nature of the case and its current status.', tip:'Name the police station or court, the case/FIR number if known, and its current stage (pending, closed, acquitted, convicted).', verifiable:true},
    {id:'restraining', label:'Any restraining or protection order filed by or against this person?', detail:'Provide details — when, by whom, current status.', tip:"Mention which court issued it, the date, and whether it's still active or was vacated.", verifiable:true},
    {id:'fir', label:'Any FIR filed by or against this person?', detail:'Provide details.', tip:'Give the FIR number, police station, and date if you have it — this lets the other family check status through e-Courts or the police portal.', verifiable:true},
  ]},
  { title:"Dowry & Marital Conduct", subtitle:"Dowry demand, giving, or taking is a criminal offence under the Dowry Prohibition Act, 1961 — this applies equally to both families.", fields:[
    {id:'dowryDemand', label:'Has any dowry been demanded, directly or indirectly, as a condition of this marriage?', detail:'Describe what was demanded, and by whom.', tip:'Describe exactly what was asked for, by whom, and when — vague answers here are the hardest to act on.'},
    {id:'dowryCase', label:'Has this person, or their immediate family, been named in a Section 498A cruelty complaint or a Dowry Prohibition Act case?', detail:'Provide details — case status, and outcome if concluded.', tip:'State the case number, which court or police station it sits with, and the current status or outcome.', verifiable:true},
  ]},
  { title:"Marital History", fields:[
    {id:'priorMarriage', label:'Any prior marriage, divorce, or annulment?', detail:'When, and how it concluded.', tip:"Include when the marriage took place, how and when it ended, and whether it's legally finalized (decree date, if any).", verifiable:true},
    {id:'priorChildren', label:'Any children from a previous relationship?', detail:'Provide details.', tip:'Mention how many children, the current custody arrangement, and any ongoing support obligations.'},
  ]},
  { title:"Cross-Border / NRI Considerations", subtitle:"Relevant given the well-documented pattern of undisclosed foreign marriages and post-marriage abandonment abroad.", fields:[
    {id:'currentForeignMarriage', label:'Are you currently married, or in a registered civil partnership, in any country (including outside India)?', detail:'Provide details.', tip:'Include the country, marriage date, and current legal status of that marriage or partnership.'},
    {id:'relocationAbroad', label:'Is relocation abroad expected after this marriage?', detail:'If yes, specify the country and your current visa/residency status there.', tip:'Name the specific country and describe your current visa or residency status there, if any.'},
  ]},
  { title:"Financial Disclosure", fields:[
    {id:'debts', label:'Any significant outstanding loans or debts?', detail:'Approximate amount and type.', tip:'Give the approximate amount, the lender, and the type of loan (personal, business, property, etc.).', verifiable:true},
    {id:'bankruptcy', label:'Any bankruptcy filing or loan default on record?', detail:'Provide details.', tip:'Mention the year, the court or authority involved, and the current status.', verifiable:true},
    {id:'litigation', label:'Any ongoing property or financial litigation?', detail:'Provide details.', tip:"Name the parties involved, what's in dispute, and which court it's in.", verifiable:true},
  ]},
  { title:"Health Disclosure", fields:[
    {id:'health', label:'Any health condition the other party should reasonably know before marriage?', detail:'Describe only what is relevant to informed consent (e.g. matters affecting family planning, or conditions the partner should be aware of). This is not intended to screen for or discriminate against disability.', tip:'Be specific enough for the other family to understand what it means for daily life, family planning, or care needs — without over-sharing unrelated medical history.'},
  ]},
  { title:"Behavioral History", subtitle:"Answered by the family, based on direct knowledge.", fields:[
    {id:'violence', label:'Has this person ever been physically violent toward a partner or family member?', detail:'Provide details.', tip:'Describe what happened, roughly when, and who was involved — this is the hardest disclosure to independently verify, so specificity matters most here.'},
    {id:'substance', label:'Any history of substance abuse?', detail:'Provide details.', tip:'Mention the substance, how recent, and whether there has been treatment or ongoing use.'},
    {id:'controlling', label:'Has the family observed controlling or possessive behavior in past relationships?', detail:'Provide details.', tip:'Describe the specific behaviour the family observed, and roughly when.'},
  ]},
  { title:"Recent Timeline", subtitle:"A short, unrehearsed chronological account is easier to independently verify than isolated answers — gaps are worth a conversation, not an accusation.", fields:[
    {id:'timeline', label:'Briefly describe where you have lived and worked over the last 5 years, in chronological order.', type:'longtext', placeholder:'e.g. 2021–2023: Studied at XYZ College, Chennai.\n2023–present: Working at ABC Ltd, Bengaluru.'},
  ]},
];

const GLOSSARY = [
  { term:"Section 318, Bharatiya Nyaya Sanhita (2023)", def:"The provision covering cheating — dishonestly inducing someone into an act (such as marriage) through deception or concealment of material facts." },
  { term:"Section 498A, cruelty by husband/relatives", def:"Covers cruelty, including harassment linked to dowry demands, by a husband or his relatives toward a wife." },
  { term:"Dowry Prohibition Act, 1961", def:"Makes the giving, taking, or demanding of dowry a criminal offence in India, regardless of which family initiates it." },
  { term:"FIR (First Information Report)", def:"The document police register when they first learn of a cognisable offence — the formal starting point of a criminal case." },
];

const EMPLOYMENT_FIELDS = [
  {id:'employer', label:'Current employer & designation', type:'text', verifiable:true},
  {id:'employmentType', label:'Employment type', type:'select', options:['Salaried','Self-employed','Business owner','Not currently employed']},
  {id:'income', label:'Approximate monthly income', type:'select', options:['Below ₹25,000','₹25,000 – ₹50,000','₹50,000 – ₹1,00,000','₹1,00,000 – ₹2,50,000','Above ₹2,50,000','Prefer to disclose privately']},
];

const DECLARATION_TEXT = `I declare that the information provided above is true to the best of my knowledge and has not been given with intent to conceal or mislead. I understand that a false declaration made to induce another person into marriage may constitute an offence under <b>Section 318 of the Bharatiya Nyaya Sanhita, 2023</b> (cheating). I further understand that the giving, taking, or demanding of dowry is a criminal offence under the <b>Dowry Prohibition Act, 1961</b>. I understand this signed, timestamped record may be relied upon as evidence in any future legal proceeding, including matrimonial disputes.`;

function uid(n=8){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s='';
  const arr = new Uint32Array(n);
  crypto.getRandomValues(arr);
  for(let i=0;i<n;i++) s+=chars[arr[i]%chars.length];
  return s;
}

async function sha256(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function getHashParams(){
  const h = window.location.hash.replace(/^#/,'');
  const params = new URLSearchParams(h);
  const rawCase = params.get('case');
  // Case IDs are meant to be a short alphanumeric code (see uid()). Strip
  // anything else so a hand-typed or crafted case code can't smuggle a ':'
  // or similar character into our "doc:{caseId}:{role}:{fieldId}" storage
  // key scheme and collide with another case's stored documents.
  const caseId = rawCase ? rawCase.replace(/[^A-Za-z0-9]/g, '').slice(0, 32) : null;
  // SECURITY: Whitelist the role parameter to only 'A' or 'B'. A crafted
  // URL with role=A:crimCase could manipulate storage keys (e.g.
  // doc:{caseId}:A:crimCase:{fieldId}) if passed through unsanitized.
  const rawRole = params.get('role');
  const role = (rawRole === 'A' || rawRole === 'B') ? rawRole : null;
  return { caseId, role };
}

function setHash(caseId, role){
  const p = new URLSearchParams();
  if(caseId) p.set('case', caseId);
  if(role) p.set('role', role);
  window.location.hash = p.toString();
}

async function loadCase(caseId){
  try{
    const res = await window.storage.get('case:'+caseId, true);
    return res ? JSON.parse(res.value) : null;
  }catch(e){ return null; }
}
async function saveCase(caseId, data){
  try{
    await window.storage.set('case:'+caseId, JSON.stringify(data), true);
    return true;
  }catch(e){ console.error(e); return false; }
}

let pollTimer = null;
function stopPoll(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }

const app = document.getElementById('app');

// Every value that originates from a user (form answers, names, reference
// details, uploaded filenames) or from the URL (the case ID) is untrusted
// and must be escaped before going into innerHTML. Without this, someone
// could type a script tag as a disclosure answer and have it execute in the
// other family's browser when they open the reveal screen — or craft a
// malicious case link where the case ID itself carries the payload.
function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ---------- SUPPORTING DOCUMENTS ----------
// Docs are stored separately from the case record (own shared key per field)
// so the polled case payload stays small. Each doc is hashed; that hash is
// folded into the same answers object covered by the per-side declaration
// hash, so a swapped document breaks the existing tamper-evidence chain too.
let pendingDocs = {}; // fieldId -> { dataUrl, mime, filename } for the side currently filling the form

function docStorageKey(caseId, role, fieldId){
  return `doc:${caseId}:${role}:${fieldId}`;
}

async function saveDoc(caseId, role, fieldId, docObj){
  try{
    await window.storage.set(docStorageKey(caseId, role, fieldId), JSON.stringify(docObj), true);
    return true;
  }catch(e){ console.error(e); return false; }
}

// Resize + recompress an image client-side so it fits comfortably inside the
// storage system's per-key text limit. Images only (no PDFs) for this MVP —
// a phone photo of a certificate/order/statement covers the real-world case.
function compressImage(file){
  return new Promise((resolve, reject)=>{
    if(!file.type || !file.type.startsWith('image/')){
      reject(new Error('Please attach an image file (a photo or scan, JPG/PNG).'));
      return;
    }
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error('Could not read that file.'));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error('Could not read that image.'));
      img.onload = ()=>{
        const MAX_DIM = 1400;
        let { width, height } = img;
        if(width > MAX_DIM || height > MAX_DIM){
          const scale = Math.min(MAX_DIM/width, MAX_DIM/height);
          width = Math.round(width*scale);
          height = Math.round(height*scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0,0,width,height);
        ctx.drawImage(img, 0, 0, width, height);

        let quality = 0.75;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);
        const MAX_B64 = 1.4 * 1024 * 1024; // ~1.4MB base64 string, well under the 5MB/key storage cap
        let attempts = 0;
        while(dataUrl.length > MAX_B64 && attempts < 6){
          quality = Math.max(0.35, quality - 0.12);
          dataUrl = canvas.toDataURL('image/jpeg', quality);
          attempts++;
        }
        if(dataUrl.length > MAX_B64){
          reject(new Error('This image is too large even after compression — try a lighter photo or crop it tighter.'));
          return;
        }
        resolve({ dataUrl, sizeBytes: Math.round(dataUrl.length * 0.75) });
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

// Fetch a stored document, re-hash it live, and compare against the hash
// recorded at signing time — a real integrity check, not just a badge.
async function viewDocument(caseId, role, fieldId, fieldLabel, expectedHash){
  const overlay = document.createElement('div');
  overlay.className = 'doc-overlay';
  overlay.innerHTML = `
    <div class="doc-lightbox">
      <div class="doc-lightbox-head">
        <div>
          <div style="font-weight:600;font-size:14px;">${escapeHtml(fieldLabel)}</div>
          <div class="doc-verify-status" id="docVerifyStatus">Checking document integrity…</div>
        </div>
        <button class="btn-secondary" id="docCloseBtn">Close</button>
      </div>
      <div class="doc-lightbox-body" id="docLightboxBody"><div class="note">Loading…</div></div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('docCloseBtn').onclick = ()=>overlay.remove();
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) overlay.remove(); });

  try{
    const res = await window.storage.get(docStorageKey(caseId, role, fieldId), true);
    const doc = JSON.parse(res.value);
    const body = document.getElementById('docLightboxBody');
    const isSafeUrl = doc.dataUrl && (doc.dataUrl.startsWith('data:image/') || doc.dataUrl.startsWith('data:application/pdf'));
    const safeUrl = isSafeUrl ? doc.dataUrl : '#';
    if(doc.mime && doc.mime.startsWith('image/') && isSafeUrl){
      body.innerHTML = `<img src="${escapeHtml(safeUrl)}" alt="${escapeHtml(fieldLabel)}">`;
    } else {
      body.innerHTML = `<a href="${escapeHtml(safeUrl)}" download="${escapeHtml(doc.filename||'document')}" class="btn-primary">Download document</a>`;
    }
    const recomputedHash = await sha256(doc.dataUrl);
    const statusEl = document.getElementById('docVerifyStatus');
    if(recomputedHash === expectedHash){
      statusEl.textContent = '✓ Verified — matches the signed record, unmodified since locking.';
      statusEl.style.color = 'var(--verified)';
    } else {
      statusEl.textContent = '⚠ Could not verify — this file does not match the hash recorded at signing.';
      statusEl.style.color = 'var(--seal)';
    }
  }catch(e){
    document.getElementById('docLightboxBody').innerHTML = '<div class="note">Could not load this document.</div>';
    document.getElementById('docVerifyStatus').textContent = '';
  }
}

async function handleLock(caseId, role, schema){
  const individualName = document.getElementById('individualName').value.trim();
  const signerName = document.getElementById('signerName').value.trim();
  const signerRelation = document.getElementById('signerRelation').value;
  const agree = document.getElementById('agreeBox').checked;

  const ref1Name = document.getElementById('ref1Name').value.trim();
  const ref1Phone = document.getElementById('ref1Phone').value.trim();
  const ref2Name = document.getElementById('ref2Name').value.trim();
  const ref2Phone = document.getElementById('ref2Phone').value.trim();

  if(!individualName || !signerName || !signerRelation){
    alert('Please fill in the individual\'s name, your name, and your relation before signing.');
    return;
  }
  if(!ref1Name || !ref1Phone || !ref2Name || !ref2Phone){
    alert('Please provide both references — name and WhatsApp number — before signing.');
    return;
  }
  const digits1 = ref1Phone.replace(/[^0-9]/g,'');
  const digits2 = ref2Phone.replace(/[^0-9]/g,'');
  if(digits1.length < 10 || digits2.length < 10){
    alert('Please include the country code and full number for both references (e.g. +91 98765 43210).');
    return;
  }
  if(!agree){
    alert('Please confirm the declaration checkbox before locking.');
    return;
  }

  const answers = {};
  schema.forEach(sec=>sec.fields.forEach(f=>{
    if(f.type==='text' || f.type==='longtext'){
      answers[f.id] = { value: app.querySelector(`[data-role="text"][data-id="${f.id}"]`).value.trim() };
    } else if(f.type==='select'){
      answers[f.id] = { value: app.querySelector(`[data-role="select"][data-id="${f.id}"]`).value };
    } else {
      const activeBtn = app.querySelector(`.yn-btn.active-yes[data-id="${f.id}"], .yn-btn.active-no[data-id="${f.id}"]`);
      const yn = activeBtn ? activeBtn.dataset.yn : null;
      const detail = app.querySelector(`[data-role="detail"][data-id="${f.id}"]`).value.trim();
      answers[f.id] = { value: yn, detail: yn==='Yes' ? detail : '' };
    }
  }));

  const missingYN = schema.some(sec=>sec.fields.some(f=> f.type!=='text' && f.type!=='longtext' && f.type!=='select' && !answers[f.id].value));
  if(missingYN){
    alert('Please answer every Yes/No question before locking.');
    return;
  }
  if(!answers.timeline || answers.timeline.value.trim().length < 15){
    alert('Please provide a brief account of where you\'ve lived and worked over the last 5 years before locking.');
    return;
  }

  // Save any attached supporting documents and fold their hashes into the
  // answers object — this is the same object covered by the declaration
  // hash below, so a document swapped in later breaks that hash too.
  const docFields = [];
  for(const sec of schema){
    for(const f of sec.fields){
      if(f.verifiable && pendingDocs[f.id]) docFields.push(f);
    }
  }
  const docResults = await Promise.all(docFields.map(async (f)=>{
    const doc = pendingDocs[f.id];
    const docHash = await sha256(doc.dataUrl);
    const savedOk = await saveDoc(caseId, role, f.id, { mime: doc.mime, dataUrl: doc.dataUrl, filename: doc.filename, hash: docHash });
    return { fieldId: f.id, savedOk, docHash, filename: doc.filename };
  }));
  for(const r of docResults){
    if(!r.savedOk){ alert('Could not upload one of the attached documents — please try again.'); return; }
    answers[r.fieldId].hasDoc = true;
    answers[r.fieldId].docHash = r.docHash;
    answers[r.fieldId].docFilename = r.filename;
  }

  const references = [
    { name: ref1Name, phone: digits1 },
    { name: ref2Name, phone: digits2 },
  ];

  const lockedAt = Date.now();
  const payload = { individualName, signerName, signerRelation, answers, references, lockedAt };
  const hash = await sha256(JSON.stringify(payload) + '|' + caseId + '|' + role);

  let caseData = await loadCase(caseId);
  if(!caseData) caseData = { id:caseId, createdAt: Date.now(), sides:{A:null,B:null} };
  caseData.sides[role] = { ...payload, hash };
  const ok = await saveCase(caseId, caseData);
  if(!ok){ alert('Could not save — please try again.'); return; }

  route();
}

  const flagHtml = (side) => side.flags.length ? side.flags.map(f=>`
      <div style="margin-bottom:10px;">
        <div style="font-weight:600;font-size:13px;">${escapeHtml(side.name)} — ${escapeHtml(f.label)}</div>
        ${f.detail ? `<div style="font-size:12.5px;color:var(--ink-soft);margin-top:2px;">${escapeHtml(f.detail)}</div>` : ''}
      </div>`).join('') : '';

  app.innerHTML = `
    ${letterhead(caseId)}
    <div class="status-banner status-locked">✓ Both families signed and locked — declaration finalized.</div>

    <div class="paper-panel" style="border-color:${totalFlags ? 'var(--seal)':'var(--verified)'};">
      <h2 class="section-title">${totalFlags ? `${totalFlags} item${totalFlags>1?'s':''} to discuss` : 'No disclosures flagged'}</h2>
      <p class="section-sub">${totalFlags ? 'Every "Yes" answer from either family, pulled up front so the conversation can focus here first.' : 'Both families answered "No" to every disclosure question below. Still worth reading the full declaration and independently verifying what matters most to you.'}</p>
      ${flagHtml(flagsA)}${flagHtml(flagsB)}
    </div>

    <div class="paper-panel no-print" style="padding:16px 24px;">
      <button class="btn-secondary" id="printBtn">Download / Print Declaration</button>
    </div>
    <div class="side-compare">
      <div class="side-card">
        <h3>${escapeHtml(A.individualName)}</h3>
        <div class="side-meta">Signed by ${escapeHtml(A.signerName)} (${escapeHtml(A.signerRelation)})<br>Locked ${new Date(A.lockedAt).toLocaleString()}</div>
        ${answerRow(schema, A, caseId, 'A')}
        <details style="margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);">
          <summary style="cursor:pointer;font-size:11px;color:var(--ink-soft);">Technical verification details</summary>
          <div class="hash-tag" style="border-top:none;margin-top:6px;padding-top:0;">SHA-256 · ${escapeHtml(A.hash)}</div>
        </details>
      </div>
      <div class="side-card">
        <h3>${escapeHtml(B.individualName)}</h3>
        <div class="side-meta">Signed by ${escapeHtml(B.signerName)} (${escapeHtml(B.signerRelation)})<br>Locked ${new Date(B.lockedAt).toLocaleString()}</div>
        ${answerRow(schema, B, caseId, 'B')}
        <details style="margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);">
          <summary style="cursor:pointer;font-size:11px;color:var(--ink-soft);">Technical verification details</summary>
          <div class="hash-tag" style="border-top:none;margin-top:6px;padding-top:0;">SHA-256 · ${escapeHtml(B.hash)}</div>
        </details>
      </div>
    </div>

    <div class="paper-panel no-print">
      <h2 class="section-title">Independent verification — where to check for yourself</h2>
      <p class="section-sub">This declaration is self-reported. These are real, free, official Indian tools to independently verify what matters most before proceeding.</p>
      ${VERIFICATION_LINKS.map(v=>`
        <div style="margin-bottom:12px;">
          <a href="${v.url}" target="_blank" rel="noopener" style="font-weight:600;font-size:13.5px;color:var(--seal);">${v.label} ↗</a>
          <div style="font-size:12.5px;color:var(--ink-soft);">${v.note}</div>
        </div>`).join('')}
    </div>

    <div class="paper-panel no-print">
      <h2 class="section-title">References — provided by each family, for you to contact</h2>
      <p class="section-sub">Each family names 2 people who know their side well. The point of a reference is that it's <b>you contacting someone the other family named</b> — not either family checking in with their own contact and reporting back. Reach out directly.</p>
      <div style="margin-bottom:18px;">
        <div style="font-weight:600;font-size:13.5px;margin-bottom:8px;">References for ${escapeHtml(A.individualName)} <span style="font-weight:400;color:var(--ink-soft);">— provided by ${escapeHtml(A.signerName)}'s family</span></div>
        ${refList(A.references, A.individualName, A.signerName, A.signerRelation, A.answers.employer ? A.answers.employer.value : '', B.individualName)}
      </div>
      <div>
        <div style="font-weight:600;font-size:13.5px;margin-bottom:8px;">References for ${escapeHtml(B.individualName)} <span style="font-weight:400;color:var(--ink-soft);">— provided by ${escapeHtml(B.signerName)}'s family</span></div>
        ${refList(B.references, B.individualName, B.signerName, B.signerRelation, B.answers.employer ? B.answers.employer.value : '', A.individualName)}
      </div>
    </div>
    <div class="footer-note">Case ${escapeHtml(caseId)} · This is an MVP demonstration, not a certified legal instrument. Consult a lawyer for enforceability in your jurisdiction.</div>
  `;
  document.getElementById('printBtn').onclick = ()=>window.print();
  app.querySelectorAll('[data-doc-view]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      viewDocument(btn.dataset.case, btn.dataset.role, btn.dataset.field, btn.dataset.label, btn.dataset.hash);
    });
  });
  app.querySelectorAll('[data-ref-wa]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const { phone, subject, provider, relation, employer, otherName } = btn.dataset;
      const idLine = [
        `family contact: ${provider}${relation ? ' ('+relation+')' : ''}`,
        employer ? `currently: ${employer}` : null,
        otherName ? `being considered for marriage to: ${otherName}` : null,
      ].filter(Boolean).join(' · ');
      const msg = `Hi, this is a pre-marital disclosure check regarding ${subject}. To help confirm you have the right person — ${idLine}. You were named as a reference by ${provider}'s family. Could you honestly answer: (1) Have you ever known ${subject} to be physically violent or controlling toward a partner? (2) Are you aware of any concealed debts, prior marriages, or legal cases involving ${subject}? Your honest answer helps two families make an informed decision. Thank you.`;
      window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    });
  });
}

function refList(references, subjectName, providerName, relation, employer, otherName){
  if(!references || !references.length) return `<div class="note">No references on record.</div>`;
  return references.map(r=>`
    <div class="ref-row" style="align-items:center;">
      <div style="flex:1;font-size:13.5px;">${escapeHtml(r.name)}</div>
      <button type="button" class="whatsapp-btn" data-ref-wa data-phone="${escapeHtml(r.phone)}" data-subject="${escapeHtml(subjectName)}" data-provider="${escapeHtml(providerName)}" data-relation="${escapeHtml(relation||'')}" data-employer="${escapeHtml(employer||'')}" data-other-name="${escapeHtml(otherName||'')}">Message on WhatsApp</button>
    </div>
  `).join('');
}

// ---------- ROUTER ----------
async function route(){
  const { caseId, role } = getHashParams();
  if(!caseId){ renderHome(); return; }

  let caseData = await loadCase(caseId);
  if(!caseData){
    app.innerHTML = `${letterhead(caseId)}<div class="paper-panel"><h2 class="section-title">Case not found</h2><p class="section-sub">This case code doesn't exist yet, or hasn't been created on this device's session. Ask the person who shared it to resend the link.</p><div class="btn-row"><button class="btn-secondary" id="backHome">Start over</button></div></div>`;
    document.getElementById('backHome').onclick = ()=>{ window.location.hash=''; route(); };
    return;
  }

  const effectiveRole = role || (caseData.sides.A ? 'B' : 'A');

  if(caseData.sides.A && caseData.sides.B){
    renderReveal(caseId, caseData);
    return;
  }

  if(caseData.sides[effectiveRole]){
    // this side already locked, waiting on the other
    renderShare(caseId, effectiveRole, caseData);
    return;
  }

  renderForm(caseId, effectiveRole, caseData);
}

window.addEventListener('hashchange', route);
route();
</script>
</body>
</html>
